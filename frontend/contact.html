<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Lovelines International</title>
    
    <link rel="stylesheet" href="assets/css/styles.css">

    <style>
        /* --- Contact Page Specific CSS --- */
        .contact-section {
            padding: 80px 5%;
            background-color: var(--off-white);
            display: flex;
            justify-content: center;
        }

        .contact-container {
            background: var(--white);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-top: 5px solid var(--primary-red);
        }

        .contact-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .contact-header h2 {
            font-size: 2.2rem;
            color: var(--primary-red);
            margin-bottom: 10px;
        }

        .contact-header p {
            color: #666;
            font-size: 1.1rem;
        }

        /* Form Styling */
        #contactForm {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            color: var(--dark-text);
        }

        .form-group input, 
        .form-group textarea {
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 8px rgba(211, 47, 47, 0.15);
        }

        /* Submit Button */
        .submit-btn {
            background-color: var(--primary-red);
            color: var(--white);
            padding: 16px;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--hover-red);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(211, 47, 47, 0.3);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .contact-container {
                padding: 20px;
            }
            .contact-header h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main>
        <section class="contact-section">
            <div class="contact-container">
                <div class="contact-header">
                    <h2>Reach Out to Us</h2>
                    <p>We are here to listen, support, and pray with you.</p>
                </div>

                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input id="name" type="text" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input id="email" type="email" placeholder="example@mail.com" required>
                    </div>

                    <div class="form-group">
                        <label for="message">How can we help you?</label>
                        <textarea id="message" rows="6" placeholder="Your message or prayer request..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/api.js"></script>

</body>
</html>
