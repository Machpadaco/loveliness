<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Lovelines</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="../assets/css/styles.css">

</head>
<body>

     <div id="header-placeholder"></div>

<div class="login-card">
    <h2>Admin Login</h2>
    <div id="message"></div>
    <input id="email" type="email" placeholder="Admin Email">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn" onclick="login()">Login</button>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const messageDiv = document.getElementById("message");
    const loginBtn = document.getElementById("loginBtn");

    // Basic validation
    if (!email || !password) {
        messageDiv.innerText = "Please fill in all fields";
        return;
    }

    try {
        loginBtn.innerText = "Logging in...";
        loginBtn.disabled = true;

        const res = await fetch("http://localhost:5000/api/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
            // ✅ SAVING AS "token" to match your admin.js check
            localStorage.setItem("token", data.token);
            window.location.href = "admin.html";
        } else {
            messageDiv.innerText = data.message || "Invalid credentials";
            loginBtn.innerText = "Login";
            loginBtn.disabled = false;
        }

    } catch (error) {
        console.error(error);
        messageDiv.innerText = "Server error. Is the backend running?";
        loginBtn.innerText = "Login";
        loginBtn.disabled = false;
    }
}
</script>
<div id="footer-placeholder"></div>
<script src="admin.js"></script>

</body>
</html>
