<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Lovelines</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .login-card { 
            background: white; 
            padding: 30px; 
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 350px; 
            text-align: center;

            margin: auto; /* 🔥 centers perfectly between header & footer */
        }

        h2 { 
            color: #333; 
            margin-bottom: 20px; 
        }

        input { 
            width: 100%;
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            box-sizing: border-box; 
        }

        button  { 
            width: 100%; 
            padding: 12px; 
            background: red; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px;
            transition: 0.3s; 
        }

        button:hover { 
            background: darkred; 
        }

        #message {
            color: red; 
            font-size: 14px; 
            margin-bottom: 10px; 
        }
    </style>

    <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body>

    <div id="header-placeholder"></div>

    <div class="login-card">
        <h2>Admin Login</h2>
        <div id="message"></div>
        <input id="email" type="email" placeholder="Admin Email">
        <input id="password" type="password" placeholder="Password">
        <button id="loginBtn">Login</button>
    </div>

    <div id="footer-placeholder"></div>

    <script src="admin.js"></script>

</body>
</html>
