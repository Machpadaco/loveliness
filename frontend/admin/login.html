<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Lovelines</title>
    <style>

        .login-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: red; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: darkred; }
        #message { color: red; font-size: 14px; margin-bottom: 10px; }
    </style>
    <link rel="stylesheet" href="../assets/css/styles.css">

</head>
<body>

     <div id="header-placeholder"></div>

<div class="login-card">
    <h2>Admin Login</h2>
    <div id="message"></div>
    <input id="email" type="email" placeholder="Admin Email">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn" onclick="login()">Login</button>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const messageDiv = document.getElementById("message");
    const loginBtn = document.getElementById("loginBtn");

    // Basic validation
    if (!email || !password) {
        messageDiv.innerText = "Please fill in all fields";
        return;
    }

    try {
        loginBtn.innerText = "Logging in...";
        loginBtn.disabled = true;

        const res = await fetch("http://localhost:5000/api/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
            // ✅ SAVING AS "token" to match your admin.js check
            localStorage.setItem("token", data.token);
            window.location.href = "admin.html";
        } else {
            messageDiv.innerText = data.message || "Invalid credentials";
            loginBtn.innerText = "Login";
            loginBtn.disabled = false;
        }

    } catch (error) {
        console.error(error);
        messageDiv.innerText = "Server error. Is the backend running?";
        loginBtn.innerText = "Login";
        loginBtn.disabled = false;
    }
}
</script>
<div id="footer-placeholder"></div>
<script src="admin.js"></script>

</body>
</html>
